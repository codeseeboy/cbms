services:
  - type: web
    name: careerbuilder-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: careerbuilder
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "false"
